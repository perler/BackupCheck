name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build release zip
        run: |
          mkdir -p release
          cp Monitor-Backups.ps1 release/
          cp Install-BackupMonitor.ps1 release/
          cp .env.example release/
          cp README.md release/
          cp LICENSE release/
          cp CHANGELOG.md release/
          cd release && zip -r ../BackupCheck-v${{ steps.version.outputs.version }}.zip .

      - name: Compute SHA256 checksums
        id: checksums
        run: |
          echo "monitor_sha256=$(sha256sum release/Monitor-Backups.ps1 | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "installer_sha256=$(sha256sum release/Install-BackupMonitor.ps1 | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Update latest.json
        run: |
          cat > latest.json <<EOF
          {
            "version": "${{ steps.version.outputs.version }}",
            "files": {
              "Monitor-Backups.ps1": {
                "sha256": "${{ steps.checksums.outputs.monitor_sha256 }}"
              },
              "Install-BackupMonitor.ps1": {
                "sha256": "${{ steps.checksums.outputs.installer_sha256 }}"
              }
            },
            "releaseUrl": "https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/BackupCheck-v${{ steps.version.outputs.version }}.zip"
          }
          EOF

      - name: Commit latest.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout master
          git add latest.json
          git diff --cached --quiet || git commit -m "Update latest.json for v${{ steps.version.outputs.version }}"
          git push origin master

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: BackupCheck-v${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
